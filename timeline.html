<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Timeline de partidos del Mundial 2026, agrupados por día." />
  <title>Mundial 2026 · Timeline</title>
  <link rel="icon" type="image/png" href="img/copa_del_mundo.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor/css/flag-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container-fluid py-4">
    <div id="server-banner" class="server-banner" hidden>
      <div class="server-banner-icon"><i class="ri-alert-line" aria-hidden="true"></i></div>
      <div class="server-banner-body">
        <strong data-i18n="banner.server.title">Servidor incorrecto.</strong>
        <span data-i18n="banner.server.body">Estás usando</span> <code>python3 -m http.server</code> <span data-i18n="banner.server.body2">(servidor estático, sin proxy CORS). Para ver datos en vivo de la API, ejecuta:</span>
        <code class="server-banner-cmd" id="server-banner-cmd">python3 server.py</code>
        <button id="server-banner-copy" class="btn btn-sm btn-outline-light ms-2" aria-label="Copiar comando">
          <i class="ri-file-copy-line" aria-hidden="true"></i> Copiar
        </button>
      </div>
      <button id="server-banner-close" class="server-banner-close" aria-label="Cerrar">
        <i class="ri-close-line" aria-hidden="true"></i>
      </button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 small text-muted">
      <span><i class="ri-timeline-view" aria-hidden="true"></i> <span id="data-source" data-i18n="common.loading">Cargando…</span></span>
      <span><i class="ri-refresh-line" aria-hidden="true"></i> <span id="last-refresh">—</span></span>
    </div>

    <section class="view active">
      <h2 class="bebas section-title"><i class="ri-time-line" aria-hidden="true"></i> <span data-i18n="tl.title">Timeline del Mundial</span></h2>

      <div class="timeline-summary row g-3 mb-4" id="timeline-summary"></div>

      <div class="filter-bar p-3 rounded mb-3">
        <div class="row g-2 align-items-center">
          <div class="col-12 col-md-3">
            <label for="tl-stage" class="form-label small mb-1" data-i18n="cal.filters.phase">Etapa</label>
            <select id="tl-stage" class="form-select form-select-sm">
              <option value="" data-i18n="cal.filters.allPhases">Todas las fases</option>
              <option value="group" data-i18n="stage.group">Fase de grupos</option>
              <option value="r32" data-i18n="stage.round_of_32">32avos de final</option>
              <option value="r16" data-i18n="stage.round_of_16">Octavos de final</option>
              <option value="qf" data-i18n="stage.quarter_finals">Cuartos de final</option>
              <option value="sf" data-i18n="stage.semi_finals">Semifinales</option>
              <option value="final" data-i18n="stage.final">Final</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label for="tl-status" class="form-label small mb-1" data-i18n="common.filter">Estado</label>
            <select id="tl-status" class="form-select form-select-sm">
              <option value="" data-i18n="common.all">Todos</option>
              <option value="pending" data-i18n="status.upcoming">PRÓXIMO</option>
              <option value="live" data-i18n="status.live">EN VIVO</option>
              <option value="finished" data-i18n="status.finished">FINALIZADO</option>
            </select>
          </div>
          <div class="col-12 col-md-4">
            <label for="tl-jump" class="form-label small mb-1" data-i18n="tl.filters.jumpToDate">Saltar a fecha</label>
            <select id="tl-jump" class="form-select form-select-sm">
              <option value="" data-i18n="tl.filters.selectDay">Selecciona un día…</option>
            </select>
          </div>
          <div class="col-12 col-md-2 text-md-end">
            <label class="form-label small mb-1 d-block">&nbsp;</label>
            <div class="btn-group btn-group-sm w-100" role="group" aria-label="Modo de vista">
              <input type="radio" class="btn-check" name="tl-mode" id="tl-mode-day" value="day" autocomplete="off" checked>
              <label class="btn btn-outline-light" for="tl-mode-day" data-i18n="tl.filters.day">Día</label>
              <input type="radio" class="btn-check" name="tl-mode" id="tl-mode-week" value="week" autocomplete="off">
              <label class="btn btn-outline-light" for="tl-mode-week" data-i18n="tl.filters.week">Semana</label>
            </div>
          </div>
        </div>
        <div class="small text-muted mt-2" id="tl-count"></div>
      </div>

      <div id="timeline-container"></div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="db.js"></script>
  <script src="seed.js?v=3"></script>
  <script src="api.js"></script>
  <script src="i18n.js"></script>
  <script src="components.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
