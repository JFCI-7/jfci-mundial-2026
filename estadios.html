<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Las 16 sedes del Mundial 2026 en México, Estados Unidos y Canadá." />
  <title>Mundial 2026 · Estadios</title>
  <link rel="icon" type="image/png" href="img/copa_del_mundo.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor/css/flag-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container-fluid py-4">
    <div id="server-banner" class="server-banner" hidden>
      <div class="server-banner-icon"><i class="ri-alert-line" aria-hidden="true"></i></div>
      <div class="server-banner-body">
        <strong data-i18n="banner.server.title">Servidor incorrecto.</strong>
        <span data-i18n="banner.server.body">Estás usando</span> <code>python3 -m http.server</code> <span data-i18n="banner.server.body2">(servidor estático, sin proxy CORS). Para ver datos en vivo de la API, ejecuta:</span>
        <code class="server-banner-cmd" id="server-banner-cmd">python3 server.py</code>
        <button id="server-banner-copy" class="btn btn-sm btn-outline-light ms-2" aria-label="Copiar comando">
          <i class="ri-file-copy-line" aria-hidden="true"></i> Copiar
        </button>
      </div>
      <button id="server-banner-close" class="server-banner-close" aria-label="Cerrar">
        <i class="ri-close-line" aria-hidden="true"></i>
      </button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 small text-muted">
      <span><i class="ri-building-2-line" aria-hidden="true"></i> <span id="data-source" data-i18n="common.loading">Cargando…</span></span>
      <span><i class="ri-refresh-line" aria-hidden="true"></i> <span id="last-refresh">—</span></span>
    </div>

    <section class="view active">
      <h2 class="bebas section-title"><i class="ri-building-2-line" aria-hidden="true"></i> <span data-i18n="st.title">Sedes del Mundial</span></h2>

      <div class="stadium-summary row g-3 mb-4" id="stadium-summary"></div>

      <div class="filter-bar p-3 rounded mb-3">
        <div class="row g-2 align-items-center">
          <div class="col-12 col-md-5">
            <label for="stadium-search" class="form-label small mb-1" data-i18n="common.search">Buscar</label>
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="ri-search-line" aria-hidden="true"></i></span>
              <input id="stadium-search" type="search" class="form-control" placeholder="Ej. Miami, Azteca, BC Place…" autocomplete="off" />
            </div>
          </div>
          <div class="col-12 col-md-4">
            <label for="stadium-country" class="form-label small mb-1" data-i18n="st.filters.country">País</label>
            <select id="stadium-country" class="form-select form-select-sm">
              <option value="" data-i18n="st.filters.allCountries">Todos los países</option>
            </select>
          </div>
          <div class="col-12 col-md-3 text-md-end">
            <label class="form-label small mb-1 d-block">&nbsp;</label>
            <div class="btn-group btn-group-sm w-100" role="group" aria-label="Filtro de región">
              <input type="radio" class="btn-check" name="stadium-region" id="region-all" value="" autocomplete="off" checked>
              <label class="btn btn-outline-light" for="region-all" data-i18n="common.all">Todas</label>
              <input type="radio" class="btn-check" name="stadium-region" id="region-western" value="Western" autocomplete="off">
              <label class="btn btn-outline-light" for="region-western" data-i18n="region.Western">Oeste</label>
              <input type="radio" class="btn-check" name="stadium-region" id="region-central" value="Central" autocomplete="off">
              <label class="btn btn-outline-light" for="region-central" data-i18n="region.Central">Centro</label>
              <input type="radio" class="btn-check" name="stadium-region" id="region-eastern" value="Eastern" autocomplete="off">
              <label class="btn btn-outline-light" for="region-eastern" data-i18n="region.Eastern">Este</label>
            </div>
          </div>
        </div>
      </div>

      <div id="stadiums-container" class="row g-3"></div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="db.js"></script>
  <script src="seed.js"></script>
  <script src="api.js"></script>
  <script src="i18n.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
