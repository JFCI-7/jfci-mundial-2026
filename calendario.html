<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Calendario completo de los 104 partidos del Mundial 2026." />
  <title>Mundial 2026 · Calendario</title>
  <link rel="icon" type="image/png" href="img/copa_del_mundo.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container-fluid py-4">
    <div id="server-banner" class="server-banner" hidden>
      <div class="server-banner-icon"><i class="ri-alert-line" aria-hidden="true"></i></div>
      <div class="server-banner-body">
        <strong data-i18n="banner.server.title">Servidor incorrecto.</strong>
        <span data-i18n="banner.server.body">Estás usando</span> <code>python3 -m http.server</code> <span data-i18n="banner.server.body2">(servidor estático, sin proxy CORS). Para ver datos en vivo de la API, ejecuta:</span>
        <code class="server-banner-cmd" id="server-banner-cmd">python3 server.py</code>
        <button id="server-banner-copy" class="btn btn-sm btn-outline-light ms-2" aria-label="Copiar comando">
          <i class="ri-file-copy-line" aria-hidden="true"></i> Copiar
        </button>
      </div>
      <button id="server-banner-close" class="server-banner-close" aria-label="Cerrar">
        <i class="ri-close-line" aria-hidden="true"></i>
      </button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 small text-muted">
      <span><i class="ri-database-2-line" aria-hidden="true"></i> <span id="data-source" data-i18n="common.loading">Cargando…</span></span>
      <span><i class="ri-refresh-line" aria-hidden="true"></i> <span id="last-refresh">—</span></span>
    </div>

    <section class="view active">
      <h2 class="bebas section-title"><i class="ri-calendar-event-line" aria-hidden="true"></i> <span data-i18n="cal.title">Calendario de Encuentros</span></h2>
      <div class="filter-bar card card-mundial p-3 mb-3">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label small" for="filter-group"><i class="ri-filter-3-line" aria-hidden="true"></i> <span data-i18n="cal.filters.group">Grupo</span></label>
            <select id="filter-group" class="form-select form-select-sm"><option value="" data-i18n="cal.filters.allGroups">Todos los grupos</option></select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label small" for="filter-round" data-i18n="groups.matchday">Jornada</label>
            <select id="filter-round" class="form-select form-select-sm">
              <option value="" data-i18n="common.all">Todas</option>
              <option value="1">J1</option>
              <option value="2">J2</option>
              <option value="3">J3</option>
            </select>
          </div>
          <div class="col-12 col-md-6 text-md-end">
            <button id="btn-refresh" class="btn btn-sm btn-outline-light"><i class="ri-refresh-line" aria-hidden="true"></i> <span data-i18n="common.refresh">Refrescar</span></button>
          </div>
        </div>
      </div>
      <div id="matches-list" class="d-flex flex-column gap-2"></div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <div id="modal" class="modal-mundial" hidden>
    <div class="modal-overlay" data-close></div>
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-mundial-content">
        <button class="btn-close-mundial" data-close aria-label="Cerrar"><i class="ri-close-line" aria-hidden="true"></i></button>
        <h3 class="bebas" id="modal-title"><i class="ri-edit-2-line" aria-hidden="true"></i> <span data-i18n="cal.editScore">Editar marcador</span></h3>
        <div class="score-form my-3">
          <div class="team-input">
            <img id="team-a-flag" class="flag-32" alt="" />
            <span id="team-a-name" class="team-name">Equipo A</span>
            <input type="number" id="score-a" min="0" value="0" class="form-control form-control-lg text-center" />
            <button class="btn btn-sm btn-outline-success goal-btn" data-team="a" aria-label="Sumar gol local"><i class="ri-football-line" aria-hidden="true"></i> Gol</button>
          </div>
          <span class="vs bebas">VS</span>
          <div class="team-input">
            <img id="team-b-flag" class="flag-32" alt="" />
            <span id="team-b-name" class="team-name">Equipo B</span>
            <input type="number" id="score-b" min="0" value="0" class="form-control form-control-lg text-center" />
            <button class="btn btn-sm btn-outline-success goal-btn" data-team="b" aria-label="Sumar gol visitante"><i class="ri-football-line" aria-hidden="true"></i> Gol</button>
          </div>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-12">
            <label class="form-label small" for="match-status">Estado</label>
            <select id="match-status" class="form-select form-select-sm">
              <option value="pending">Pendiente</option>
              <option value="live">En vivo</option>
              <option value="finished">Finalizado</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label small" for="match-note"><i class="ri-sticky-note-line" aria-hidden="true"></i> Nota (opcional)</label>
            <input type="text" id="match-note" class="form-control form-control-sm" placeholder="Ej. Gignac 2' autogol" />
          </div>
        </div>
        <div class="modal-actions d-flex gap-2 justify-content-end">
          <button id="btn-clear-override" class="btn btn-sm btn-outline-secondary"><i class="ri-restart-line" aria-hidden="true"></i> Restaurar oficial</button>
          <button id="btn-cancel" class="btn btn-sm btn-secondary" data-close>Cancelar</button>
          <button id="btn-save-score" class="btn btn-sm btn-primary"><i class="ri-save-3-line" aria-hidden="true"></i> Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="seed.js?v=5"></script>
  <script src="api.js"></script>
  <script src="i18n.js"></script>
  <script src="components.js"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
