<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Test goal notification</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="vendor/css/flag-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>
  <main class="container-fluid py-4">
    <h1 class="bebas">Test: Simular gol en vivo</h1>
    <p class="text-muted small">Esta página inyecta 2 partidos en vivo en STATE y dispara <code>detectGoalChanges()</code>.</p>
    <button id="btn-test" class="btn btn-primary">Simular gol de México</button>
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script>
  // Mock de STATE
  const STATE = {
    matchesById: new Map(),
    matches: [],
    teams: new Map(),
    stadiums: new Map(),
    standings: new Map(),
  };

  const m1 = {
    id: "test-mx-sa",
    source: "api",
    stage: "group",
    matchday: 1,
    group: "A",
    home: { name: "Mexico", iso2: "mx", name_en: "Mexico" },
    away: { name: "South Africa", iso2: "za", name_en: "South Africa" },
    date: new Date().toISOString(),
    home_score: 0,
    away_score: 0,
    status: "live",
    time_elapsed: 23,
  };
  STATE.matches.push(m1);
  STATE.matchesById.set(m1.id, m1);

  // Inyectar el showToast/detectGoalChanges del app.js real
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]); }
  function effectiveScore(m) { return { home: m.home_score, away: m.away_score, source: m.source }; }
  function showToast(message, kind = "info", durationMs = 4500, contentHtml = null) {
    const container = document.getElementById("toast-container");
    if (!container) return;
    const item = document.createElement("div");
    item.className = `toast-item toast-${kind}`;
    if (contentHtml) item.innerHTML = contentHtml;
    else item.innerHTML = `<i class="ri-information-line" aria-hidden="true"></i><span>${escapeHtml(message)}</span>`;
    container.appendChild(item);
    requestAnimationFrame(() => item.classList.add("show"));
    setTimeout(() => { item.classList.remove("show"); setTimeout(() => item.remove(), 350); }, durationMs);
  }
  function goalToastHtml(match, scoringTeam) {
    const s = effectiveScore(match);
    const isHome = scoringTeam === "home";
    const team = isHome ? match.home : match.away;
    const otherTeam = isHome ? match.away : match.home;
    const newScore = `${s.home}-${s.away}`;
    const minute = match.time_elapsed || "—";
    return `
      <div class="toast-goal">
        <div class="toast-goal-icon" aria-hidden="true"><i class="ri-football-fill"></i></div>
        <div class="toast-goal-body">
          <div class="toast-goal-head">
            <span class="toast-goal-team">⚽ ¡Gol de ${escapeHtml(team.name)}!</span>
            <span class="toast-goal-minute">${escapeHtml(String(minute))}'</span>
          </div>
          <div class="toast-goal-score">
            <span class="fi fi-${team.iso2} flag-24"></span>
            <span class="toast-goal-team-name">${escapeHtml(team.name)}</span>
            <span class="toast-goal-numbers bebas">${newScore}</span>
            <span class="fi fi-${otherTeam.iso2} flag-24"></span>
            <span class="toast-goal-team-name">${escapeHtml(otherTeam.name)}</span>
          </div>
          <a class="toast-goal-link" href="calendario.html">Ver partido <i class="ri-arrow-right-line"></i></a>
        </div>
      </div>
    `;
  }
  const PREVIOUS_SCORES = new Map();
  function detectGoalChanges() {
    const live = STATE.matches.filter(m => m.status === "live" || m.status === "finished");
    for (const m of live) {
      const s = effectiveScore(m);
      if (s.home === null || s.away === null) continue;
      const prev = PREVIOUS_SCORES.get(m.id);
      if (!prev) {
        PREVIOUS_SCORES.set(m.id, { home: s.home, away: s.away, status: m.status });
        continue;
      }
      if (s.home > prev.home && m.status === "live") {
        showToast(null, "goal", 6000, goalToastHtml(m, "home"));
      }
      if (s.away > prev.away && m.status === "live") {
        showToast(null, "goal", 6000, goalToastHtml(m, "away"));
      }
      PREVIOUS_SCORES.set(m.id, { home: s.home, away: s.away, status: m.status });
    }
  }

  document.getElementById("btn-test").addEventListener("click", () => {
    runScenario();
  });

  // Auto-run al cargar para el headless
  function runScenario() {
    // 1ra poll: score 0-0 (no notifica)
    detectGoalChanges();
    // 2da poll: México anota gol (debe notificar)
    setTimeout(() => {
      m1.home_score = 1;
      m1.time_elapsed = 24;
      detectGoalChanges();
    }, 200);
    // 3ra poll: México anota otro gol (debe notificar)
    setTimeout(() => {
      m1.home_score = 2;
      m1.time_elapsed = 31;
      detectGoalChanges();
    }, 400);
  }

  // Ejecutar al cargar
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", runScenario);
  } else {
    runScenario();
  }
  </script>
</body>
</html>
