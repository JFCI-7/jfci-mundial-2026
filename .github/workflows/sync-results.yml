name: Sync Results from OpenFootball
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/sync-results.mjs
      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "World Cup Sync Bot"
            git config user.email "bot@jfci-mundial-2026"
            git add mundial2026_calendario.json
            git commit -m "sync: resultados automáticos vía openfootball"
            git push
          else
            echo "No changes to commit."
          fi

